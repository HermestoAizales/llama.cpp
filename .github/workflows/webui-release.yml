name: WebUI Release Build

on:
  workflow_dispatch:

jobs:
  build-server-windows:
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install ccache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: windows-cpu-x64
          variant: ccache
          evict-old-files: 1d

      - name: Install Ninja
        run: choco install ninja --no-progress

      - name: Build llama-server (CPU only)
        shell: pwsh
        run: |
          # Build matching official CPU release strategy
          cmake -S . -B build -G "Ninja Multi-Config" `
            -DLLAMA_BUILD_SERVER=ON `
            -DLLAMA_BUILD_EXAMPLES=OFF `
            -DLLAMA_BUILD_TESTS=OFF `
            -DLLAMA_BUILD_TOOLS=ON `
            -DLLAMA_BUILD_BORINGSSL=ON `
            -DGGML_RPC=ON `
            -DGGML_NATIVE=OFF `
            -DGGML_CPU_ALL_VARIANTS=ON
          
          cmake --build build --config Release --target llama-server -j $(($env:NUMBER_OF_PROCESSORS - 1))

      - name: Download official ggml-cuda DLL
        shell: pwsh
        run: |
          # Download ggml-cuda.dll from latest official release (CUDA 13.1)
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/ggml-org/llama.cpp/releases/latest"
          $cudaAsset = $release.assets | Where-Object { $_.name -match "cuda-13.1" }
          if ($cudaAsset) {
            Write-Host "Downloading $($cudaAsset.name)..."
            Invoke-WebRequest -Uri $cudaAsset.browser_download_url -OutFile "cuda-release.zip"
            Expand-Archive -Path "cuda-release.zip" -DestinationPath "cuda-extract" -Force
            # Show what we got
            Get-ChildItem "cuda-extract" -Recurse | ForEach-Object { Write-Host "  $($_.FullName)" }
          } else {
            Write-Host "WARNING: No CUDA 13.1 asset found"
          }

      - name: Collect release package
        shell: pwsh
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "release-package"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null
          
          # Main binary and all DLLs from build
          Copy-Item "build\bin\Release\llama-server.exe" $releaseDir
          Get-ChildItem "build\bin\Release\*.dll" | ForEach-Object {
            Copy-Item $_.FullName $releaseDir
            Write-Host "Copied $($_.Name) from build"
          }
          
          # CUDA DLL and runtime from official release
          if (Test-Path "cuda-extract") {
            Get-ChildItem "cuda-extract" -Recurse -Filter "*.dll" | ForEach-Object {
              # Only copy DLLs that aren't already present from build
              $destPath = Join-Path $releaseDir $_.Name
              if (-not (Test-Path $destPath)) {
                Copy-Item $_.FullName $releaseDir
                Write-Host "Copied from official release: $($_.Name)"
              }
            }
          }
          
          # OpenSSL DLLs
          if (Test-Path "C:\Program Files\OpenSSL\bin") {
            Get-ChildItem "C:\Program Files\OpenSSL\bin\libcrypto-3-x64.dll","C:\Program Files\OpenSSL\bin\libssl-3-x64.dll" -ErrorAction SilentlyContinue | ForEach-Object {
              $destPath = Join-Path $releaseDir $_.Name
              if (-not (Test-Path $destPath)) {
                Copy-Item $_.FullName $releaseDir
                Write-Host "Copied $($_.Name) from OpenSSL"
              }
            }
          }
          
          Write-Host "`n=== Release package contents ==="
          Get-ChildItem $releaseDir | Select-Object Name, @{N="SizeMB";E={[math]::Round($_.Length/1MB,2)}} | Format-Table

      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: llama-server-win-x64
          path: release-package/
          retention-days: 30
