name: WebUI Release Build

on:
  workflow_dispatch:

jobs:
  build-server-windows:
    runs-on: windows-2022
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build llama-server.exe (WebUI embedded)
        shell: bash
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 \
            -DLLAMA_BUILD_SERVER=ON \
            -DLLAMA_CURL=ON \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DCMAKE_BUILD_TYPE=Release
          
          cmake --build build --config Release \
            --target llama-server \
            --parallel
          
          # Copy all dependencies to the output directory
          # Find and copy OpenSSL DLLs from the runner (usually in vcpkg or system)
          find C:/vcpkg/installed -name "libcrypto-3-x64.dll" -exec cp {} build/bin/Release/ \; 2>/dev/null || true
          find C:/vcpkg/installed -name "libssl-3-x64.dll" -exec cp {} build/bin/Release/ \; 2>/dev/null || true
          
          # Copy libcurl.dll if not already there
          find C:/vcpkg/installed -name "libcurl-x64.dll" -exec cp {} build/bin/Release/ \; 2>/dev/null || true
          find C:/vcpkg/installed -name "libcurl.dll" -exec cp {} build/bin/Release/ \; 2>/dev/null || true
          
          echo "=== Release directory contents ==="
          ls -la build/bin/Release/

      - name: Upload llama-server.exe with dependencies
        uses: actions/upload-artifact@v4
        with:
          name: llama-server-win-x64
          path: |
            build/bin/Release/llama-server.exe
            build/bin/Release/libcrypto-3-x64.dll
            build/bin/Release/libssl-3-x64.dll
            build/bin/Release/libcurl.dll
            build/bin/Release/libcurl-x64.dll
          retention-days: 30
          if-no-files-found: ignore
