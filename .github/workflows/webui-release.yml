name: WebUI Release Build

on:
  workflow_dispatch:

jobs:
  build-server-windows:
    runs-on: windows-2022
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build llama-server.exe (WebUI embedded)
        shell: bash
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 \
            -DLLAMA_BUILD_SERVER=ON \
            -DLLAMA_CURL=ON \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DCMAKE_BUILD_TYPE=Release
          
          cmake --build build --config Release \
            --target llama-server \
            --parallel

      - name: Collect ALL dependencies
        shell: bash
        run: |
          mkdir -p release-package
          cp build/bin/Release/llama-server.exe release-package/
          
          echo "=== Finding DLLs ==="
          
          # Search common locations for OpenSSL and CURL DLLs
          SEARCH_PATHS=(
            "C:/Program Files/OpenSSL/bin"
            "C:/OpenSSL/bin"
            "C:/Program Files (x86)/OpenSSL/bin"
          )
          
          for dll in libcrypto-3-x64.dll libssl-3-x64.dll libcurl-x64.dll libcurl.dll; do
            FOUND=false
            for path in "${SEARCH_PATHS[@]}"; do
              if [ -f "$path/$dll" ]; then
                cp "$path/$dll" release-package/
                echo "Copied $dll from $path"
                FOUND=true
                break
              fi
            done
            if [ "$FOUND" = false ]; then
              echo "WARNING: $dll not found in expected locations"
            fi
          done
          
          # Also copy any DLLs that are already in the build output (like libwinpthread, etc.)
          find build/bin/Release -name "*.dll" -exec cp {} release-package/ \; 2>/dev/null || true
          
          echo ""
          echo "=== Final package contents ==="
          ls -la release-package/

      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: llama-server-win-x64
          path: release-package/
          retention-days: 30
