name: WebUI Release Build

on:
  workflow_dispatch:

jobs:
  build-webui-windows:
    runs-on: windows-2025
    timeout-minutes: 50

    env:
      CUDA_VERSION: 13.1.1

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "tools/server/webui/package-lock.json"

      - name: Build WebUI
        working-directory: tools/server/webui
        run: |
          npm ci
          npx vite build
          bash ./scripts/post-build.sh

      - name: ccache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: windows-latest-cuda-x64-v3
          variant: ccache
          evict-old-files: 1d

      - name: Install Ninja
        id: install_ninja
        run: choco install ninja --no-progress

      - name: Build
        shell: pwsh
        run: |
          cmake -S . -B build -G "Ninja Multi-Config" ``
            -D CMAKE_C_COMPILER=clang-cl.exe ``
            -D CMAKE_CXX_COMPILER=clang-cl.exe ``
            -DLLAMA_BUILD_BORINGSSL=ON ``
            -DGGML_CUDA=ON ``
            -DCMAKE_CUDA_COMPILER=nvcc.exe ``
            -DCMAKE_CUDA_ARCHITECTURES=86;89;120 ``
            -DGGML_NATIVE=OFF ``
            -DGGML_BACKEND_DL=ON ``
            -DGGML_CPU_ALL_VARIANTS=ON ``
            -DGGML_OPENMP=ON ``
            -DLLAMA_BUILD_SERVER=ON ``
            -DLLAMA_BUILD_EXAMPLES=OFF ``
            -DLLAMA_BUILD_TESTS=OFF ``
            -DLLAMA_BUILD_TOOLS=OFF ``
            -DGGML_RPC=ON
          cmake --build build --config Release

      - name: Pack artifacts
        shell: pwsh
        run: |
          7z a -snl llama-server-win-cuda13-x64.zip .\build\bin\Release\*

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: llama-server-win-cuda13-x64
          path: llama-server-win-cuda13-x64.zip
