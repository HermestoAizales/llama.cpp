name: WebUI Release Build

on:
  workflow_dispatch:

jobs:
  build-server-windows:
    runs-on: windows-2022
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build llama-server.exe (WebUI embedded)
        shell: bash
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 \
            -DLLAMA_BUILD_SERVER=ON \
            -DLLAMA_CURL=ON \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DCMAKE_BUILD_TYPE=Release
          
          cmake --build build --config Release \
            --target llama-server \
            --parallel

      - name: Find and collect all DLLs
        shell: bash
        run: |
          mkdir -p release-package
          
          # Copy main binary
          cp build/bin/Release/llama-server.exe release-package/
          
          # Copy all DLLs from build output directory
          cp build/bin/Release/*.dll release-package/ 2>/dev/null || true
          
          # Find OpenSSL DLLs - they could be in various locations
          for dir in \
            "C:/Program Files/OpenSSL/bin" \
            "C:/OpenSSL/bin" \
            "C:/vcpkg/installed/x64-windows/bin" \
            "C:/vcpkg/installed/x64-windows-static/bin"; do
            if [ -d "$dir" ]; then
              echo "Searching: $dir"
              for dll in libcrypto-3-x64.dll libssl-3-x64.dll; do
                if [ -f "$dir/$dll" ]; then
                  cp "$dir/$dll" release-package/
                  echo "Copied $dll from $dir"
                fi
              done
            fi
          done
          
          # Find CURL DLLs
          for dir in \
            "C:/vcpkg/installed/x64-windows/bin" \
            "C:/vcpkg/installed/x64-windows-static/bin" \
            "C:/Windows/System32"; do
            if [ -d "$dir" ]; then
              for dll in libcurl-x64.dll libcurl.dll; do
                if [ -f "$dir/$dll" ]; then
                  cp "$dir/$dll" release-package/ 2>/dev/null || true
                  echo "Copied $dll from $dir"
                fi
              done
            fi
          done

          # Debug: Show what we found
          echo ""
          echo "=== Release package contents ==="
          ls -la release-package/
          
          echo ""
          echo "=== Checking if OpenSSL DLLs found ==="
          ls -la release-package/libcrypto-3-x64.dll release-package/libssl-3-x64.dll 2>/dev/null || echo "OpenSSL DLLs NOT FOUND"

      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: llama-server-win-x64
          path: release-package/
          retention-days: 30
