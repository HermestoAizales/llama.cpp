name: WebUI Release Build

on:
  workflow_dispatch:

jobs:
  build-server-windows:
    runs-on: windows-2025
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install ccache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: windows-latest-cpu-x64
          variant: ccache
          evict-old-files: 1d

      - name: Install Ninja
        run: choco install ninja --no-progress

      - name: Build (CPU only, matching official windows-cpu)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          cmake -S . -B build -G "Ninja Multi-Config" ^
            -D CMAKE_TOOLCHAIN_FILE=cmake/x64-windows-llvm.cmake ^
            -DLLAMA_BUILD_BORINGSSL=ON ^
            -DGGML_NATIVE=OFF ^
            -DGGML_BACKEND_DL=ON ^
            -DGGML_CPU_ALL_VARIANTS=ON ^
            -DGGML_OPENMP=ON ^
            -DLLAMA_BUILD_SERVER=ON ^
            -DLLAMA_BUILD_EXAMPLES=OFF ^
            -DLLAMA_BUILD_TESTS=OFF ^
            -DLLAMA_BUILD_TOOLS=ON ^
            -DGGML_RPC=ON
          cmake --build build --config Release

      - name: Download official CUDA 13.1 artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dlls\cuda" | Out-Null
          
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/ggml-org/llama.cpp/releases/latest"
          $cudaAsset = $release.assets | Where-Object { $_.name -match "llama-bin-win-cuda-13.1-x64.zip" }
          if ($cudaAsset) {
            Write-Host "Downloading $($cudaAsset.name)"
            Invoke-WebRequest -Uri $cudaAsset.browser_download_url -OutFile "dlls\cuda.zip"
            Expand-Archive -Path "dlls\cuda.zip" -DestinationPath "dlls\cuda" -Force
          }

      - name: Collect minimal release package
        shell: pwsh
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "release-package"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null
          
          # Only llama-server.exe + essential DLLs (matching official release contents)
          $essentialFiles = @(
            "llama-server.exe",
            "llama.dll",           # core library
            "mtmd.dll",            # multimodal
            "ggml.dll",            # ggml core
            "ggml-base.dll",       # ggml base backend
            "libomp140.x86_64.dll" # OpenMP runtime
          )
          
          foreach ($f in $essentialFiles) {
            $src = Join-Path "build\bin\Release" $f
            if (Test-Path $src) {
              Copy-Item $src $releaseDir
              Write-Host "Copied $f from build"
            }
          }
          
          # CPU backend variants
          Get-ChildItem "build\bin\Release\ggml-cpu-*.dll" | ForEach-Object {
            Copy-Item $_.FullName $releaseDir
            Write-Host "Copied $($_.Name)"
          }

          # CUDA backend DLL and CUDA runtime DLLs from official release
          # (matching the official llama-bin-win-cuda-*.zip which includes runtime DLLs)
          if (Test-Path "dlls\cuda") {
            Get-ChildItem "dlls\cuda" -Recurse -Filter "*.dll" | ForEach-Object {
              $dest = Join-Path $releaseDir $_.Name
              if (-not (Test-Path $dest)) {
                Copy-Item $_.FullName $dest
                Write-Host "Added from official release: $($_.Name)"
              } else {
                Write-Host "Already exists, skipping: $($_.Name)"
              }
            }
          }

          # libcurl + OpenSSL for --curl build
          Get-ChildItem "build\bin\Release\libcurl*.dll" -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item $_.FullName $releaseDir
            Write-Host "Copied $($_.Name)"
          }
          
          if (Test-Path "C:\Program Files\OpenSSL\bin") {
            Get-ChildItem "C:\Program Files\OpenSSL\bin\libcrypto-3-x64.dll","C:\Program Files\OpenSSL\bin\libssl-3-x64.dll" -ErrorAction SilentlyContinue | ForEach-Object {
              $dest = Join-Path $releaseDir $_.Name
              if (-not (Test-Path $dest)) {
                Copy-Item $_.FullName $dest
                Write-Host "Added OpenSSL: $($_.Name)"
              }
            }
          }
          
          # RPC server (optional but small)
          $rpcSrc = Join-Path "build\bin\Release" "rpc-server.exe"
          if (Test-Path $rpcSrc) {
            Copy-Item $rpcSrc $releaseDir
          }
          
          Write-Host "`n=== Final package ==="
          Get-ChildItem $releaseDir | Select-Object Name, @{N="SizeMB";E={[math]::Round($_.Length/1MB,2)}} | Format-Table

      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: llama-server-win-cuda13.1-x64
          path: release-package/
          retention-days: 30
