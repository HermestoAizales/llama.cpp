name: WebUI Release Build

on:
  workflow_dispatch:

jobs:
  build-server-windows:
    runs-on: windows-2022
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build llama-server.exe (WebUI embedded)
        shell: pwsh
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DLLAMA_BUILD_SERVER=ON `
            -DLLAMA_CURL=ON `
            -DLLAMA_BUILD_EXAMPLES=OFF `
            -DLLAMA_BUILD_TESTS=OFF `
            -DCMAKE_BUILD_TYPE=Release
          
          cmake --build build --config Release `
            --target llama-server `
            --parallel

      - name: Collect all runtime dependencies
        shell: pwsh
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "release-package"
          $buildDir = Join-Path $env:GITHUB_WORKSPACE "build\bin\Release"
          
          # Create release directory
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null
          
          # Copy llama-server.exe
          Copy-Item "$buildDir\llama-server.exe" $releaseDir
          
          # Copy all DLLs from build output (llama.dll, ggml.dll, etc.)
          Get-ChildItem "$buildDir\*.dll" | ForEach-Object {
            Copy-Item $_.FullName $releaseDir
            Write-Host "Copied $($_.Name) from build"
          }
          
          # Copy OpenSSL DLLs (3.x format)
          $opensslBinPaths = @(
            "C:\Program Files\OpenSSL\bin",
            "C:\OpenSSL-Win64\bin",
            "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin",
            "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static\bin"
          )
          
          foreach ($path in $opensslBinPaths) {
            if (Test-Path $path) {
              Get-ChildItem "$path\libcrypto-3-x64.dll","$path\libssl-3-x64.dll" -ErrorAction SilentlyContinue | ForEach-Object {
                Copy-Item $_.FullName $releaseDir
                Write-Host "Copied $($_.Name) from $path"
              }
            }
          }
          
          # Copy libcurl and its dependencies
          $curlPaths = @(
            "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin",
            "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static\bin",
            "C:\Windows\System32"
          )
          
          foreach ($path in $curlPaths) {
            if (Test-Path $path) {
              Get-ChildItem "$path\libcurl*.dll" -ErrorAction SilentlyContinue | ForEach-Object {
                if (-not (Test-Path "$releaseDir\$($_.Name)")) {
                  Copy-Item $_.FullName $releaseDir
                  Write-Host "Copied $($_.Name) from $path"
                }
              }
            }
          }
          
          # Copy runtime DLLs from vcpkg if they exist
          if ($env:VCPKG_INSTALLATION_ROOT) {
            $runtimeDlls = @("zlib*.dll", "libxml2*.dll", "nghttp2*.dll", "zstd*.dll")
            foreach ($dll in $runtimeDlls) {
              Get-ChildItem "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin\$dll" -ErrorAction SilentlyContinue | ForEach-Object {
                if (-not (Test-Path "$releaseDir\$($_.Name)")) {
                  Copy-Item $_.FullName $releaseDir
                  Write-Host "Copied $($_.Name) from vcpkg"
                }
              }
            }
          }
          
          # Final listing
          Write-Host "`n=== Release package contents ==="
          Get-ChildItem $releaseDir | Select-Object Name, @{Name="SizeMB";Expression={[math]::Round($_.Length/1MB,2)}} | Format-Table

      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: llama-server-win-x64
          path: release-package/
          retention-days: 30
