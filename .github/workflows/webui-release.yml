name: WebUI Release Build

on:
  workflow_dispatch:

jobs:
  build-server-windows:
    runs-on: windows-2022
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build llama-server.exe (WebUI embedded)
        shell: pwsh
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DLLAMA_BUILD_SERVER=ON `
            -DLLAMA_CURL=ON `
            -DLLAMA_BUILD_EXAMPLES=OFF `
            -DLLAMA_BUILD_TESTS=OFF `
            -DCMAKE_BUILD_TYPE=Release
          
          cmake --build build --config Release `
            --target llama-server `
            --parallel

      - name: Copy all runtime dependencies
        shell: pwsh
        run: |
          # Create release folder
          $releaseDir = "release-package"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null
          
          # Copy llama-server.exe
          Copy-Item "build\bin\Release\llama-server.exe" $releaseDir
          
          # Copy all DLLs from build output
          Get-ChildItem "build\bin\Release\*.dll" | ForEach-Object {
            Copy-Item $_.FullName $releaseDir
          }
          
          # Copy OpenSSL DLLs from Windows system path
          $opensslPaths = @(
            "C:\Program Files\OpenSSL\bin"
          )
          
          $neededDlls = @("libcrypto-3-x64.dll", "libssl-3-x64.dll", "libcurl.dll")
          
          foreach ($dll in $neededDlls) {
            foreach ($path in $opensslPaths) {
              $fullPath = Join-Path $path $dll
              if (Test-Path $fullPath) {
                Copy-Item $fullPath $releaseDir
                Write-Host "Copied $dll from $path"
                break
              }
            }
          }
          
          # Copy CURL DLL (usually in vcpkg or system)
          Get-ChildItem -Recurse -Path "C:\" -Filter "libcurl*.dll" -ErrorAction SilentlyContinue -Depth 3 | ForEach-Object {
            if ($_.DirectoryName -notmatch "Windows\\WinSxS") {
              $dest = Join-Path $releaseDir $_.Name
              if (-not (Test-Path $dest)) {
                Copy-Item $_.FullName $dest
                Write-Host "Copied $($_.Name) from $($_.DirectoryName)"
              }
            }
          }
          
          # Show contents
          Write-Host "`n=== Release package contents ==="
          Get-ChildItem $releaseDir | Select-Object Name, Length | Format-Table

      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: llama-server-win-x64
          path: release-package/
          retention-days: 30
