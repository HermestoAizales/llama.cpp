name: WebUI Release Build

on:
  workflow_dispatch:

jobs:
  build-webui-windows:
    runs-on: windows-2025
    timeout-minutes: 60

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "tools/server/webui/package-lock.json"

      - name: Build WebUI
        working-directory: tools/server/webui
        shell: bash
        run: |
          npm ci
          npx vite build
          bash ./scripts/post-build.sh

      - name: ccache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: windows-cuda-13.1-webui
          restore-keys: |
            windows-cuda-13.1
            windows-cuda-
          variant: ccache
          max-size: 2G
          save: true

      - name: Install Cuda Toolkit
        uses: ./.github/actions/windows-setup-cuda
        with:
          cuda_version: 13.1

      - name: Install Ninja
        run: choco install ninja --no-progress

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          cmake -S . -B build -G "Ninja Multi-Config" ^
            -DGGML_BACKEND_DL=ON ^
            -DGGML_NATIVE=OFF ^
            -DGGML_CPU=OFF ^
            -DGGML_CUDA=ON ^
            -DLLAMA_BUILD_BORINGSSL=ON ^
            -DGGML_CUDA_CUB_3DOT2=ON ^
            -DLLAMA_BUILD_SERVER=ON ^
            -DLLAMA_BUILD_EXAMPLES=OFF ^
            -DLLAMA_BUILD_TESTS=OFF ^
            -DLLAMA_BUILD_TOOLS=OFF ^
            -DGGML_RPC=ON
          set /A NINJA_JOBS=%NUMBER_OF_PROCESSORS%-1
          cmake --build build --config Release -j %NINJA_JOBS%

      - name: Pack artifacts
        run: |
          7z a -snl llama-server-win-cuda13-x64.zip .\build\bin\Release\*

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: llama-server-win-cuda13-x64
          path: llama-server-win-cuda13-x64.zip
