name: WebUI Release Build

on:
  workflow_dispatch:

jobs:
  build-server-windows:
    runs-on: windows-2025
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install ccache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: windows-latest-cpu-x64
          variant: ccache
          evict-old-files: 1d

      - name: Install Ninja
        run: choco install ninja --no-progress

      - name: Build (CPU, matching official release)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          
          cmake -S . -B build -G "Ninja Multi-Config" ^
            -D CMAKE_TOOLCHAIN_FILE=cmake/x64-windows-llvm.cmake ^
            -DLLAMA_BUILD_BORINGSSL=ON ^
            -DGGML_NATIVE=OFF ^
            -DGGML_BACKEND_DL=ON ^
            -DGGML_CPU_ALL_VARIANTS=ON ^
            -DGGML_OPENMP=ON ^
            -DLLAMA_BUILD_SERVER=ON ^
            -DLLAMA_BUILD_EXAMPLES=OFF ^
            -DLLAMA_BUILD_TESTS=OFF ^
            -DLLAMA_BUILD_TOOLS=ON ^
            -DGGML_RPC=ON
            
          cmake --build build --config Release

      - name: Download official CUDA 13.1 DLL
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "cuda-dll" | Out-Null
          
          # Get latest release
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/ggml-org/llama.cpp/releases/latest"
          
          # Download CUDA 13.1 backend DLL
          $cudaAsset = $release.assets | Where-Object { $_.name -match "llama-bin-win-cuda-13.1-x64" }
          if ($cudaAsset) {
            Write-Host "Downloading $($cudaAsset.name)..."
            Invoke-WebRequest -Uri $cudaAsset.browser_download_url -OutFile "cuda-dll\cuda-dll.zip"
            Expand-Archive -Path "cuda-dll\cuda-dll.zip" -DestinationPath "cuda-dll\extracted" -Force
            Get-ChildItem "cuda-dll\extracted" -Recurse | Where-Object { -not $_.PSIsContainer } | ForEach-Object {
              Write-Host "  Found: $($_.Name) ($([math]::Round($_.Length/1MB,2)) MB)"
            }
          } else {
            Write-Host "WARNING: CUDA 13.1 asset not found"
            $release.assets | ForEach-Object { Write-Host "  Asset: $($_.name)" }
          }
          
          # Also download CUDA runtime DLLs
          $cudartAsset = $release.assets | Where-Object { $_.name -match "cudart-llama-bin-win-cuda-13.1" }
          if ($cudartAsset) {
            Write-Host "Downloading $($cudartAsset.name)..."
            Invoke-WebRequest -Uri $cudartAsset.browser_download_url -OutFile "cuda-dll\cudart.zip"
            Expand-Archive -Path "cuda-dll\cudart.zip" -DestinationPath "cuda-dll\cudart-extracted" -Force
            Get-ChildItem "cuda-dll\cudart-extracted" -Recurse | Where-Object { -not $_.PSIsContainer } | ForEach-Object {
              Write-Host "  Found runtime: $($_.Name) ($([math]::Round($_.Length/1MB,2)) MB)"
            }
          } else {
            Write-Host "WARNING: CUDA 13.1 runtime asset not found"
          }

      - name: Collect release package
        shell: pwsh
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "release-package"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null
          
          # Copy everything from build output (matching official CPU release)
          Get-ChildItem "build\bin\Release\*" | ForEach-Object {
            Copy-Item $_.FullName $releaseDir -Force
            Write-Host "Copied $($_.Name)"
          }
          
          # Merge CUDA 13.1 DLLs
          if (Test-Path "cuda-dll\extracted") {
            Get-ChildItem "cuda-dll\extracted" -Recurse | Where-Object { -not $_.PSIsContainer } | ForEach-Object {
              $dest = Join-Path $releaseDir $_.Name
              Copy-Item $_.FullName $dest -Force
              Write-Host "Added CUDA: $($_.Name)"
            }
          }
          
          # Merge CUDA runtime DLLs
          if (Test-Path "cuda-dll\cudart-extracted") {
            Get-ChildItem "cuda-dll\cudart-extracted" -Recurse | Where-Object { -not $_.PSIsContainer } | ForEach-Object {
              $dest = Join-Path $releaseDir $_.Name
              Copy-Item $_.FullName $dest -Force
              Write-Host "Added CUDA runtime: $($_.Name)"
            }
          }
          
          # OpenSSL DLLs (needed for CURL)
          if (Test-Path "C:\Program Files\OpenSSL\bin") {
            Get-ChildItem "C:\Program Files\OpenSSL\bin\libcrypto-3-x64.dll","C:\Program Files\OpenSSL\bin\libssl-3-x64.dll" -ErrorAction SilentlyContinue | ForEach-Object {
              $dest = Join-Path $releaseDir $_.Name
              if (-not (Test-Path $dest)) {
                Copy-Item $_.FullName $dest
                Write-Host "Added OpenSSL: $($_.Name)"
              }
            }
          }
          
          Write-Host "`n=== Final package ==="
          Get-ChildItem $releaseDir | Select-Object Name, @{N="SizeMB";E={[math]::Round($_.Length/1MB,2)}} | Format-Table

      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: llama-server-win-cuda13.1-x64
          path: release-package/
          retention-days: 30
