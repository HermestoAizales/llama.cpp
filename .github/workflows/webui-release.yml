name: WebUI Release Build

on:
  workflow_dispatch:

jobs:
  build-webui-windows:
    runs-on: windows-2025
    timeout-minutes: 20

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "tools/server/webui/package-lock.json"

      - name: Build WebUI
        working-directory: tools/server/webui
        shell: bash
        run: |
          npm ci
          npx vite build
          bash ./scripts/post-build.sh

      - name: ccache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: windows-cpu-x64-webui-v2
          restore-keys: |
            windows-cpu-x64-
          variant: ccache
          max-size: 1G
          save: true

      - name: Install Ninja
        run: choco install ninja --no-progress

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          cmake -S . -B build -G "Ninja Multi-Config" ^
            -D CMAKE_TOOLCHAIN_FILE=cmake/x64-windows-llvm.cmake ^
            -DLLAMA_BUILD_BORINGSSL=ON ^
            -DGGML_NATIVE=OFF ^
            -DGGML_BACKEND_DL=ON ^
            -DGGML_CPU_ALL_VARIANTS=ON ^
            -DGGML_OPENMP=ON ^
            -DLLAMA_BUILD_SERVER=ON ^
            -DLLAMA_BUILD_EXAMPLES=OFF ^
            -DLLAMA_BUILD_TESTS=OFF ^
            -DLLAMA_BUILD_TOOLS=OFF ^
            -DGGML_RPC=ON
          cmake --build build --config Release

      - name: Pack artifacts
        run: |
          Copy-Item "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Redist\MSVC\14.44.35112\debug_nonredist\x64\Microsoft.VC143.OpenMP.LLVM\libomp140.x86_64.dll" .\build\bin\Release\
          7z a -snl llama-server-win-cpu-x64.zip .\build\bin\Release\*

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: llama-server-win-cpu-x64
          path: llama-server-win-cpu-x64.zip
