name: WebUI Release Build

on:
  workflow_dispatch:

jobs:
  build-server-windows:
    runs-on: windows-2022
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install OpenSSL (vcpkg)
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: latest
          vcpkgJsonGlob: ''

      - name: Build llama-server.exe (WebUI embedded)
        shell: bash
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 \
            -DLLAMA_BUILD_SERVER=ON \
            -DLLAMA_CURL=ON \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DCMAKE_BUILD_TYPE=Release
          
          cmake --build build --config Release \
            --target llama-server \
            --parallel

      - name: Verify build
        shell: bash
        run: |
          ls -la build/bin/Release/llama-server.exe
          file build/bin/Release/llama-server.exe

      - name: Find SSL DLLs
        shell: bash
        run: |
          find /c -name "libcrypto-3-x64.dll" 2>/dev/null | head -10
          echo "---"
          find /c -name "libssl-3-x64.dll" 2>/dev/null | head -10

      - name: Collect all Windows binaries
        shell: bash
        run: |
          mkdir -p webui-release
          cp build/bin/Release/llama-server.exe webui-release/
          
          # Copy libcurl and all its dependencies
          find build/bin/Release -name "*.dll" -exec cp {} webui-release/ \; 2>/dev/null || true
          
          # Copy system/MSVC runtime DLLs that might be needed
          for dll in libcrypto-3-x64.dll libssl-3-x64.dll libcurl.dll vcruntime*.dll ucrtbase*.dll ms*.dll libxml2*.dll zlib*.dll; do
            for dir in C:/ \
                     C:/Windows/System32/ \
                     C:/vcpkg/installed/x64-windows/bin \
                     C:/vcpkg/installed/x64-windows-release/bin \
                     build/bin/Release/; do
              if [ -f "$dir/$dll" ]; then
                cp "$dir/$dll" webui-release/
                echo "Copied $dir/$dll"
              fi
            done
          done
          
          echo "=== Package contents ==="
          ls -la webui-release/

      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: llama-server-win-x64
          path: webui-release/
          retention-days: 30
