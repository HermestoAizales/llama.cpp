name: WebUI Release Build

on:
  workflow_dispatch:

jobs:
  build-webui:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install and build WebUI
        working-directory: tools/server/webui
        run: |
          npm ci
          npm run build
          ls -la public/

      - name: Upload built WebUI
        uses: actions/upload-artifact@v4
        with:
          name: webui-built
          path: |
            tools/server/webui/public/index.html
            tools/server/webui/public/bundle.js
            tools/server/webui/public/bundle.css
            tools/server/webui/public/loading.html

  build-server-windows:
    runs-on: windows-2025
    needs: build-webui
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install ccache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: windows-latest-cpu-x64-v4
          variant: ccache
          evict-old-files: 1d

      - name: Install Ninja
        run: choco install ninja --no-progress

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          cmake -S . -B build -G "Ninja Multi-Config" ^
            -D CMAKE_TOOLCHAIN_FILE=cmake/x64-windows-llvm.cmake ^
            -DLLAMA_BUILD_BORINGSSL=ON ^
            -DGGML_NATIVE=OFF ^
            -DGGML_BACKEND_DL=ON ^
            -DGGML_CPU_ALL_VARIANTS=ON ^
            -DGGML_OPENMP=ON ^
            -DLLAMA_BUILD_SERVER=ON ^
            -DLLAMA_BUILD_EXAMPLES=OFF ^
            -DLLAMA_BUILD_TESTS=OFF ^
            -DLLAMA_BUILD_TOOLS=OFF ^
            -DGGML_RPC=ON
          cmake --build build --config Release

      - name: Download WebUI built assets
        uses: actions/download-artifact@v4
        with:
          name: webui-built
          path: tools/server/webui/public/

      - name: Download official CUDA 13.1 artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "cuda-dlls" | Out-Null
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/ggml-org/llama.cpp/releases/latest"
          $cudaAsset = $release.assets | Where-Object { $_.name -match "llama-bin-win-cuda-13.1-x64.zip" }
          if ($cudaAsset) {
            Invoke-WebRequest -Uri $cudaAsset.browser_download_url -OutFile "cuda-dlls\cuda.zip"
            Expand-Archive -Path "cuda-dlls\cuda.zip" -DestinationPath "cuda-dlls" -Force
          }

      - name: Collect release package
        shell: pwsh
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "release-package"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null
          $cpuRelease = "build\bin\Release"

          @("llama-server.exe", "llama.dll", "mtmd.dll") | ForEach-Object {
            $src = Join-Path $cpuRelease $_
            if (Test-Path $src) { Copy-Item $src $releaseDir; Write-Host "Added $_" }
          }
          Get-ChildItem $cpuRelease -Filter "*.dll" | ForEach-Object {
            Copy-Item $_.FullName (Join-Path $releaseDir $_.Name)
          }
          if (Test-Path "cuda-dlls") {
            Get-ChildItem "cuda-dlls" -Recurse -Filter "*.dll" | ForEach-Object {
              $dest = Join-Path $releaseDir $_.Name
              if (-not (Test-Path $dest)) {
                Copy-Item $_.FullName $dest
                Write-Host "Added from official: $($_.Name)"
              }
            }
          }
          Get-ChildItem "build\bin\Release\libcurl*.dll" -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item $_.FullName $releaseDir
          }
          if (Test-Path "C:\Program Files\OpenSSL\bin") {
            @("libcrypto-3-x64.dll","libssl-3-x64.dll") | ForEach-Object {
              $src = "C:\Program Files\OpenSSL\bin\$_"; $dest = Join-Path $releaseDir $_
              if ((Test-Path $src) -and -not (Test-Path $dest)) {
                Copy-Item $src $dest; Write-Host "Added OpenSSL: $_"
              }
            }
          }
          Write-Host "`n=== Final package ==="
          Get-ChildItem $releaseDir | Select-Object Name, @{N="SizeMB";E={[math]::Round($_.Length/1MB,2)}} | Format-Table

      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: llama-server-win-cuda13.1-x64
          path: release-package/
          retention-days: 30
