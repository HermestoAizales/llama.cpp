name: WebUI Release Build

on:
  workflow_dispatch:

jobs:
  build-server-windows:
    runs-on: windows-2025
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install ccache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: windows-latest-cpu-x64
          variant: ccache
          evict-old-files: 1d

      - name: Install Ninja
        run: choco install ninja --no-progress

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          cmake -S . -B build -G "Ninja Multi-Config" ^
            -D CMAKE_TOOLCHAIN_FILE=cmake/x64-windows-llvm.cmake ^
            -DLLAMA_BUILD_BORINGSSL=ON ^
            -DGGML_NATIVE=OFF ^
            -DGGML_BACKEND_DL=ON ^
            -DGGML_CPU_ALL_VARIANTS=ON ^
            -DGGML_OPENMP=ON ^
            -DLLAMA_BUILD_SERVER=ON ^
            -DLLAMA_BUILD_EXAMPLES=OFF ^
            -DLLAMA_BUILD_TESTS=OFF ^
            -DLLAMA_BUILD_TOOLS=OFF ^
            -DGGML_RPC=ON
          cmake --build build --config Release

      - name: Download official CUDA 13.1 artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "cuda-dlls" | Out-Null
          
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/ggml-org/llama.cpp/releases/latest"
          $cudaAsset = $release.assets | Where-Object { $_.name -match "llama-bin-win-cuda-13.1-x64.zip" }
          if ($cudaAsset) {
            Write-Host "Downloading $($cudaAsset.name)"
            Invoke-WebRequest -Uri $cudaAsset.browser_download_url -OutFile "cuda-dlls\cuda.zip"
            Expand-Archive -Path "cuda-dlls\cuda.zip" -DestinationPath "cuda-dlls" -Force
          }

      - name: Collect release package
        shell: pwsh
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "release-package"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null
          
          $cpuRelease = "build\bin\Release"
          $cudaExtracted = "cuda-dlls"
          
          # 1. Copy llama-server.exe + llama.dll + mtmd.dll from our build
          @("llama-server.exe", "llama.dll", "mtmd.dll") | ForEach-Object {
            $src = Join-Path $cpuRelease $_
            if (Test-Path $src) {
              Copy-Item $src $releaseDir
              Write-Host "Copied $_ from our build"
            }
          }

          # 2. Copy all DLLs from our build (CPU backends, ggml.dll, ggml-base.dll, ggml-rpc.dll, OpenMP)
          Get-ChildItem $cpuRelease -Filter "*.dll" | ForEach-Object {
            $dest = Join-Path $releaseDir $_.Name
            Copy-Item $_.FullName $dest
            Write-Host "Added $_"
          }

          # 3. Add CUDA-related DLLs from official release (ggml-cuda.dll, CUDA runtime)
          #    The official zip already contains: ggml-cuda.dll + cublas64_13.dll + cublasLt64_13.dll + cudart64_13.dll
          Get-ChildItem $cudaExtracted -Recurse -Filter "*.dll" | ForEach-Object {
            $dest = Join-Path $releaseDir $_.Name
            # Only add if not already present from our build (avoids duplicate ggml.dll etc.)
            if (-not (Test-Path $dest)) {
              Copy-Item $_.FullName $dest
              Write-Host "Added from official: $($_.Name)"
            }
          }
          
          Write-Host "`n=== Final package ==="
          Get-ChildItem $releaseDir | Select-Object Name, @{N="SizeMB";E={[math]::Round($_.Length/1MB,2)}} | Format-Table

      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: llama-server-win-cuda13.1-x64
          path: release-package/
          retention-days: 30
