name: WebUI Release Build

on:
  workflow_dispatch:

jobs:
  build-server-windows-cuda:
    runs-on: windows-2022
    timeout-minutes: 60
    strategy:
      matrix:
        cuda: ['12.4']

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Ninja
        run: choco install ninja --no-progress

      - name: Install CUDA Toolkit ${{ matrix.cuda }}
        uses: Jimver/cuda-toolkit@v0.2.29
        id: cuda-toolkit
        with:
          cuda: ${{ matrix.cuda }}
          method: network

      - name: Build llama-server (CUDA)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          
          cmake -S . -B build -G "Ninja Multi-Config" ^
            -DGGML_BACKEND_DL=ON ^
            -DGGML_NATIVE=OFF ^
            -DGGML_CPU=OFF ^
            -DGGML_CUDA=ON ^
            -DLLAMA_BUILD_SERVER=ON ^
            -DLLAMA_BUILD_EXAMPLES=OFF ^
            -DLLAMA_BUILD_TESTS=OFF ^
            -DLLAMA_BUILD_BORINGSSL=ON
            
          cmake --build build --config Release --target llama-server --parallel

      - name: Collect release package
        shell: pwsh
        run: |
          # Create release directory
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "release-package"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null
          
          # Copy main binary
          Copy-Item "build\bin\Release\llama-server.exe" $releaseDir
          
          # Copy all DLLs from build output
          Get-ChildItem "build\bin\Release\*.dll" | ForEach-Object {
            Copy-Item $_.FullName $releaseDir
            Write-Host "Copied $($_.Name) from build"
          }
          
          # Copy CUDA runtime DLLs
          $cudaBinPath = "${{ env.CUDA_PATH }}\bin"
          $cudaDlls = @("cudart64_*", "cublas64_*", "cublasLt64_*")
          foreach ($pattern in $cudaDlls) {
            Get-ChildItem "$cudaBinPath\$pattern" -ErrorAction SilentlyContinue | ForEach-Object {
              Copy-Item $_.FullName $releaseDir
              Write-Host "Copied $($_.Name) from CUDA"
            }
          }
          
          # Copy OpenSSL DLLs
          $opensslPaths = @("C:\Program Files\OpenSSL\bin")
          foreach ($path in $opensslPaths) {
            if (Test-Path $path) {
              Get-ChildItem "$path\libcrypto-3-x64.dll","$path\libssl-3-x64.dll" -ErrorAction SilentlyContinue | ForEach-Object {
                Copy-Item $_.FullName $releaseDir
                Write-Host "Copied $($_.Name) from OpenSSL"
              }
            }
          }
          
          # Copy CURL DLL if needed
          Get-ChildItem "build\bin\Release\libcurl*.dll" -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item $_.FullName $releaseDir
          }
          
          Write-Host "`n=== Release package contents ==="
          Get-ChildItem $releaseDir | Select-Object Name, @{N="SizeMB";E={[math]::Round($_.Length/1MB,2)}} | Format-Table

      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: llama-server-win-cuda-x64
          path: release-package/
          retention-days: 30
